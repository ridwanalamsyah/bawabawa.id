<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c9885" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15140f" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="bawabawa.id — Enterprise Resource Planning. Sistem manajemen bisnis terpadu dengan UI Apple Liquid Glass, mobile-first, dan RBAC granular."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>bawabawa.id — Enterprise Resource Planning</title>
    <script>
      // Apply persisted theme before paint to prevent flash of wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem("bb_themeMode");
          var systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var mode = stored === "light" || stored === "dark" ? stored : (systemDark ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", mode);
          document.documentElement.style.colorScheme = mode;
        } catch (_e) {
          // localStorage may be unavailable (SSR-like environments).
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
