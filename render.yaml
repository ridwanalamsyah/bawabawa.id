# Render Blueprint for the Bawabawa.id ERP API.
#
# Deploy:
#   1. https://dashboard.render.com → "New +" → "Blueprint"
#   2. Connect this repo (ridwanalamsyah/bawabawa.id)
#   3. Render reads this file and creates the web service automatically
#
# Adds:
# - bawabawa-api: Node web service, build via existing Dockerfile, expose port 3000
# - DATABASE_URL is provisioned externally (Neon free tier — see DEPLOY.md)
#
# Render free tier: 750 hours/month, sleeps after 15 min idle. To keep warm,
# pair with a free cron-job.org ping every 10 minutes against /api/v1/health.

services:
  - type: web
    name: bawabawa-api
    runtime: docker
    repo: https://github.com/ridwanalamsyah/bawabawa.id
    branch: main
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # The values below MUST be set in the Render dashboard, NOT committed.
      # Render lets you mark them as "sync: false" so the blueprint won't
      # overwrite them on redeploy. See DEPLOY.md for the full list.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DOKU_CLIENT_ID
        sync: false
      - key: DOKU_SECRET_KEY
        sync: false
      - key: DOKU_IS_PRODUCTION
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: BITESHIP_API_KEY
        sync: false
      - key: FONNTE_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: BAWABAWA_SITE_WEBHOOK_URL
        sync: false
